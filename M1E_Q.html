<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>M1E — Quiz Days & Months</title><style>:root{--bg1:#0b1022;--bg2:#0f172a;--card:#111c33;--line:#263553;--chip:#1b2a4a;--text:#e5e7eb;--muted:#b7c0d1;--ok:#22c55e;--bad:#ef4444;--warn:#f59e0b;--a:#60a5fa}body{margin:0;font-family:system-ui,Segoe UI,Arial;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}.wrap{max-width:1040px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}h1{margin:0;font-size:24px}.sub{color:var(--muted)}.card{background:rgba(17,28,51,.9);border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}.btn{display:inline-block;padding:10px 14px;border-radius:12px;background:#1b2a4a;border:1px solid var(--line);color:var(--text);text-decoration:none;cursor:pointer}.btn.ok{border-color:rgba(34,197,94,.7)}.btn.warn{border-color:rgba(245,158,11,.8)}table{width:100%;border-collapse:collapse;margin-top:10px}td,th{border-bottom:1px solid var(--line);padding:10px;text-align:left}th{color:#dbeafe;background:#122246}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:850px){.grid{grid-template-columns:1fr}}.pill,.chip{display:inline-block;border:1px solid var(--line);background:#1b2a4a;border-radius:999px;padding:6px 10px;margin:4px;color:#dbeafe;font-size:13px}.good{border-color:rgba(34,197,94,.55);background:rgba(34,197,94,.08)}.warnbox{border-color:rgba(245,158,11,.65);background:rgba(245,158,11,.08)}.ex{border-left:4px solid var(--a);padding-left:12px;margin:12px 0}.small{color:var(--muted);font-size:14px}.opt{display:block;margin:8px 0}input[type=text]{width:min(650px,100%);padding:10px;border-radius:12px;border:1px solid var(--line);background:#0b1430;color:var(--text)}.feedback{margin-top:10px;padding:10px;border-radius:12px;display:none}.fbok{display:block;border:1px solid rgba(34,197,94,.75);background:rgba(34,197,94,.08)}.fbbad{display:block;border:1px solid rgba(239,68,68,.75);background:rgba(239,68,68,.08)}.corr{margin-top:10px;padding:10px;border:1px dashed var(--line);border-radius:12px;display:none;background:rgba(255,255,255,.03)}</style></head><body><div class="wrap">
<div class="top"><div><h1>M1E — Quiz Days & Months</h1><div class="sub">Q = pratique. Score immédiat. Corrigé disponible.</div></div><a class="btn" href="./M1E_E.html">⬅️ Retour explication</a></div>
<button class="btn ok" id="checkAll">✅ Corriger tout</button> <button class="btn warn" id="showAll">👀 Afficher les corrigés</button> <span class="chip">Score : <b id="score">0</b> / <b id="total">0</b></span><div id="quiz"></div><div class="card"><a class="btn" href="./M1E_E.html">🔁 Revoir l’explication</a></div></div>
<script>
function norm(s){return (s||"").toString().trim().toLowerCase().replace(/[’‘]/g,"'").replace(/[.!?]/g,"").replace(/\s+/g," ")}
function eq(a,b){return norm(a)===norm(b)}
const Q=[['mcq', 'Jour', 'Monday signifie :', ['lundi', 'mardi', 'dimanche'], 'lundi', 'Monday = lundi.'], ['mcq', 'Jour', 'Tuesday signifie :', ['mardi', 'jeudi', 'samedi'], 'mardi', 'Tuesday = mardi.'], ['mcq', 'Jour', 'Wednesday signifie :', ['mercredi', 'vendredi', 'lundi'], 'mercredi', 'Wednesday = mercredi.'], ['mcq', 'Jour', 'Thursday signifie :', ['jeudi', 'mardi', 'dimanche'], 'jeudi', 'Thursday = jeudi.'], ['mcq', 'Jour', 'Friday signifie :', ['vendredi', 'samedi', 'mercredi'], 'vendredi', 'Friday = vendredi.'], ['mcq', 'Jour', 'Saturday signifie :', ['samedi', 'dimanche', 'jeudi'], 'samedi', 'Saturday = samedi.'], ['mcq', 'Jour', 'Sunday signifie :', ['dimanche', 'lundi', 'vendredi'], 'dimanche', 'Sunday = dimanche.'], ['mcq', 'Mois', 'January signifie :', ['janvier', 'juin', 'juillet'], 'janvier', 'January = janvier.'], ['mcq', 'Mois', 'February signifie :', ['février', 'mars', 'avril'], 'février', 'February = février.'], ['mcq', 'Mois', 'March signifie :', ['mars', 'mai', 'août'], 'mars', 'March = mars.'], ['mcq', 'Mois', 'April signifie :', ['avril', 'août', 'octobre'], 'avril', 'April = avril.'], ['mcq', 'Mois', 'May signifie :', ['mai', 'mars', 'juin'], 'mai', 'May = mai.'], ['mcq', 'Mois', 'June signifie :', ['juin', 'juillet', 'janvier'], 'juin', 'June = juin.'], ['mcq', 'Mois', 'July signifie :', ['juillet', 'juin', 'janvier'], 'juillet', 'July = juillet.'], ['mcq', 'Mois', 'August signifie :', ['août', 'avril', 'octobre'], 'août', 'August = août.'], ['mcq', 'Mois', 'September signifie :', ['septembre', 'novembre', 'décembre'], 'septembre', 'September = septembre.'], ['mcq', 'Mois', 'October signifie :', ['octobre', 'août', 'avril'], 'octobre', 'October = octobre.'], ['mcq', 'Mois', 'November signifie :', ['novembre', 'septembre', 'décembre'], 'novembre', 'November = novembre.'], ['mcq', 'Mois', 'December signifie :', ['décembre', 'novembre', 'octobre'], 'décembre', 'December = décembre.'], ['mcq', 'Temps', 'Today signifie :', ['aujourd’hui', 'demain', 'hier'], 'aujourd’hui', 'Today = aujourd’hui.'], ['mcq', 'Temps', 'Tomorrow signifie :', ['demain', 'hier', 'aujourd’hui'], 'demain', 'Tomorrow = demain.'], ['mcq', 'Temps', 'Yesterday signifie :', ['hier', 'demain', 'semaine'], 'hier', 'Yesterday = hier.'], ['mcq', 'Règle', 'La bonne écriture est :', ['Monday', 'monday', 'MONDAY uniquement'], 'Monday', 'Jour = majuscule initiale.'], ['mcq', 'Règle', 'La bonne écriture est :', ['January', 'january', 'JANUARY uniquement'], 'January', 'Mois = majuscule initiale.'], ['fill', 'Écrire', 'Écris lundi en anglais :', [], 'Monday', 'lundi = Monday.'], ['fill', 'Écrire', 'Écris vendredi en anglais :', [], 'Friday', 'vendredi = Friday.'], ['fill', 'Écrire', 'Écris dimanche en anglais :', [], 'Sunday', 'dimanche = Sunday.'], ['fill', 'Écrire', 'Écris janvier en anglais :', [], 'January', 'janvier = January.'], ['fill', 'Écrire', 'Écris juillet en anglais :', [], 'July', 'juillet = July.'], ['fill', 'Écrire', 'Écris décembre en anglais :', [], 'December', 'décembre = December.'], ['fill', 'Écrire', 'Écris aujourd’hui en anglais :', [], 'Today', 'aujourd’hui = Today.'], ['fill', 'Écrire', 'Écris demain en anglais :', [], 'Tomorrow', 'demain = Tomorrow.'], ['fill', 'Écrire', 'Écris hier en anglais :', [], 'Yesterday', 'hier = Yesterday.'], ['mcq', 'Collège', 'Day signifie :', ['jour', 'mois', 'année'], 'jour', 'Day = jour.'], ['mcq', 'Collège', 'Month signifie :', ['mois', 'semaine', 'jour'], 'mois', 'Month = mois.'], ['mcq', 'Collège', 'Week signifie :', ['semaine', 'mois', 'année'], 'semaine', 'Week = semaine.'], ['mcq', 'Situation', 'Today is Monday. Tomorrow is :', ['Tuesday', 'Sunday', 'Friday'], 'Tuesday', 'Après Monday vient Tuesday.'], ['mcq', 'Situation', 'Today is Friday. Yesterday was :', ['Thursday', 'Saturday', 'Monday'], 'Thursday', 'Avant Friday vient Thursday.'], ['mcq', 'Situation', 'My birthday is in July. July est :', ['un mois', 'un jour', 'un nombre'], 'un mois', 'July = juillet.']];
const quiz=document.getElementById("quiz");document.getElementById("total").textContent=Q.length;
function esc(s){return (s||"").toString().replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
function render(){quiz.innerHTML="";Q.forEach((q,i)=>{let [type,tag,p,o,a,e]=q;let body=type==="mcq"?o.map(x=>`<label class="opt"><input type="radio" name="q${i}" value="${esc(x)}"> ${esc(x)}</label>`).join(""):`<input type="text" id="q${i}_text" placeholder="Écris ta réponse ici…">`;let c=document.createElement("div");c.className="card";c.innerHTML=`<b>Question ${i+1}</b> <span class="chip">${esc(tag)}</span><p>${esc(p)}</p>${body}<button class="btn ok" onclick="check(${i})">Corriger</button> <button class="btn warn" onclick="show(${i})">Voir le corrigé</button><div id="fb${i}" class="feedback"></div><div id="co${i}" class="corr"><b>Corrigé :</b> ${esc(a)}<br><span class="small">${esc(e)}</span></div>`;quiz.appendChild(c)})}
function answer(i){let type=Q[i][0];if(type==="mcq"){let x=document.querySelector(`input[name=q${i}]:checked`);return x?x.value:""}return document.getElementById(`q${i}_text`).value}
function check(i){let ok=eq(answer(i),Q[i][4]);let fb=document.getElementById("fb"+i);fb.className="feedback "+(ok?"fbok":"fbbad");fb.innerHTML=ok?"✅ Correct !":"❌ Faux. Regarde le corrigé.";if(ok)show(i);score()}
function show(i){document.getElementById("co"+i).style.display="block"}
function score(){let n=0;Q.forEach((q,i)=>{if(document.getElementById("fb"+i).classList.contains("fbok"))n++});document.getElementById("score").textContent=n}
document.getElementById("checkAll").onclick=()=>{Q.forEach((q,i)=>check(i));scrollTo({top:0,behavior:"smooth"})}
document.getElementById("showAll").onclick=()=>Q.forEach((q,i)=>show(i))
render();
</script></body></html>
