<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>M1F — Quiz Colours</title><style>body{margin:0;font-family:system-ui,Arial;background:linear-gradient(180deg,#0b1022,#0f172a);color:#e5e7eb}.wrap{max-width:1040px;margin:auto;padding:22px}.card{background:#111c33;border:1px solid #263553;border-radius:16px;padding:16px;margin:12px 0}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.btn{display:inline-block;padding:10px 14px;border-radius:12px;background:#1b2a4a;border:1px solid #263553;color:#e5e7eb;text-decoration:none;cursor:pointer}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #263553;padding:10px;text-align:left}th{background:#122246}.chip{display:inline-block;background:#1b2a4a;border:1px solid #263553;border-radius:999px;padding:6px 10px;font-size:13px}.opt{display:block;margin:8px 0}input[type=text]{width:min(650px,100%);padding:10px;border-radius:12px;border:1px solid #263553;background:#0b1430;color:#e5e7eb}.feedback{margin-top:10px;padding:10px;border-radius:12px;display:none}.fbok{display:block;border:1px solid #22c55e;background:#12381f}.fbbad{display:block;border:1px solid #ef4444;background:#3b1111}.corr{margin-top:10px;padding:10px;border:1px dashed #263553;border-radius:12px;display:none}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="top"><div><h1>M1F — Quiz Colours</h1><p>Score immédiat. Corrigé disponible.</p></div><a class="btn" href="./M1F_E.html">⬅️ Retour explication</a></div><button class="btn ok" id="checkAll">✅ Corriger tout</button> <button class="btn warn" id="showAll">👀 Afficher les corrigés</button> <span class="chip">Score : <b id="score">0</b> / <b id="total">0</b></span><div id="quiz"></div><div class="card"><a class="btn" href="./M1F_E.html">🔁 Revoir l’explication</a></div></div><script>function norm(s){return(s||"").toString().trim().toLowerCase().replace(/[’‘]/g,"'").replace(/[.!?]/g,"").replace(/\s+/g," ")}function eq(a,b){return norm(a)===norm(b)}const Q=[['mcq', 'Couleur', 'Red signifie :', ['rouge', 'bleu', 'vert'], 'rouge', 'red = rouge.'], ['mcq', 'Couleur', 'Blue signifie :', ['bleu', 'noir', 'jaune'], 'bleu', 'blue = bleu.'], ['mcq', 'Couleur', 'Green signifie :', ['vert', 'gris', 'rose'], 'vert', 'green = vert.'], ['mcq', 'Couleur', 'Yellow signifie :', ['jaune', 'orange', 'marron'], 'jaune', 'yellow = jaune.'], ['mcq', 'Couleur', 'Black signifie :', ['noir', 'blanc', 'bleu'], 'noir', 'black = noir.'], ['mcq', 'Couleur', 'White signifie :', ['blanc', 'noir', 'gris'], 'blanc', 'white = blanc.'], ['mcq', 'Couleur', 'Purple signifie :', ['violet', 'marron', 'vert'], 'violet', 'purple = violet.'], ['mcq', 'Couleur', 'Pink signifie :', ['rose', 'rouge', 'gris'], 'rose', 'pink = rose.'], ['mcq', 'Couleur', 'Brown signifie :', ['marron', 'noir', 'jaune'], 'marron', 'brown = marron.'], ['mcq', 'Couleur', 'Grey / Gray signifie :', ['gris', 'vert', 'blanc'], 'gris', 'grey/gray = gris.'], ['mcq', 'Nuance', 'Light signifie :', ['clair', 'foncé', 'rouge'], 'clair', 'light = clair.'], ['mcq', 'Nuance', 'Dark signifie :', ['foncé', 'clair', 'blanc'], 'foncé', 'dark = foncé.'], ['mcq', 'Expression', 'Light blue signifie :', ['bleu clair', 'bleu foncé', 'vert clair'], 'bleu clair', 'light blue = bleu clair.'], ['mcq', 'Expression', 'Dark green signifie :', ['vert foncé', 'vert clair', 'gris foncé'], 'vert foncé', 'dark green = vert foncé.'], ['fill', 'Écrire', 'Écris rouge en anglais :', [], 'red', 'rouge = red.'], ['fill', 'Écrire', 'Écris bleu en anglais :', [], 'blue', 'bleu = blue.'], ['fill', 'Écrire', 'Écris vert en anglais :', [], 'green', 'vert = green.'], ['fill', 'Écrire', 'Écris jaune en anglais :', [], 'yellow', 'jaune = yellow.'], ['fill', 'Écrire', 'Écris noir en anglais :', [], 'black', 'noir = black.'], ['fill', 'Écrire', 'Écris blanc en anglais :', [], 'white', 'blanc = white.'], ['fill', 'Écrire', 'Écris violet en anglais :', [], 'purple', 'violet = purple.'], ['fill', 'Écrire', 'Écris marron en anglais :', [], 'brown', 'marron = brown.'], ['fill', 'Écrire', 'Écris clair en anglais :', [], 'light', 'clair = light.'], ['fill', 'Écrire', 'Écris foncé en anglais :', [], 'dark', 'foncé = dark.'], ['mcq', 'Phrase', 'My bag is black signifie :', ['Mon sac est noir', 'Mon livre est bleu', 'Ma chaise est verte'], 'Mon sac est noir', 'bag = sac ; black = noir.'], ['mcq', 'Phrase', 'The book is blue signifie :', ['Le livre est bleu', 'Le stylo est rouge', 'Le cahier est blanc'], 'Le livre est bleu', 'book = livre ; blue = bleu.'], ['mcq', 'Phrase', 'I like green signifie :', ['J’aime le vert', 'Je vois le gris', 'Je suis vert'], 'J’aime le vert', 'I like = j’aime.'], ['mcq', 'Prononciation', 'Blue se prononce plutôt :', ['blou', 'bleu français', 'blé'], 'blou', 'blue ≈ blou.'], ['mcq', 'Prononciation', 'White commence par un son :', ['w', 'v', 'b'], 'w', 'white commence par w.'], ['mcq', 'Collège', 'Colour signifie :', ['couleur', 'nombre', 'jour'], 'couleur', 'colour = couleur.'], ['mcq', 'Collège', 'Describe signifie :', ['décrire', 'compter', 'écouter'], 'décrire', 'describe = décrire.'], ['mcq', 'Orthographe', 'Grey et gray :', ['sont deux orthographes possibles', 'sont deux couleurs différentes', 'sont faux'], 'sont deux orthographes possibles', 'UK/US : grey/gray.'], ['mcq', 'Situation', 'Vert clair :', ['light green', 'dark green', 'green light'], 'light green', 'light + couleur.'], ['mcq', 'Situation', 'Rouge foncé :', ['dark red', 'light red', 'red dark'], 'dark red', 'dark + couleur.']];const quiz=document.getElementById("quiz");document.getElementById("total").textContent=Q.length;function esc(s){return(s||"").toString().replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}function render(){quiz.innerHTML="";Q.forEach((q,i)=>{let[type,tag,p,o,a,e]=q;let body=type==="mcq"?o.map(x=>`<label class="opt"><input type="radio" name="q${i}" value="${esc(x)}"> ${esc(x)}</label>`).join(""):`<input type="text" id="q${i}_text" placeholder="Écris ta réponse ici…">`;let c=document.createElement("div");c.className="card";c.innerHTML=`<b>Question ${i+1}</b> <span class="chip">${esc(tag)}</span><p>${esc(p)}</p>${body}<button class="btn ok" onclick="check(${i})">Corriger</button> <button class="btn warn" onclick="show(${i})">Voir le corrigé</button><div id="fb${i}" class="feedback"></div><div id="co${i}" class="corr"><b>Corrigé :</b> ${esc(a)}<br><span class="small">${esc(e)}</span></div>`;quiz.appendChild(c)})}function answer(i){let type=Q[i][0];if(type==="mcq"){let x=document.querySelector(`input[name=q${i}]:checked`);return x?x.value:""}return document.getElementById(`q${i}_text`).value}function check(i){let ok=eq(answer(i),Q[i][4]);let fb=document.getElementById("fb"+i);fb.className="feedback "+(ok?"fbok":"fbbad");fb.innerHTML=ok?"✅ Correct !":"❌ Faux. Regarde le corrigé.";if(ok)show(i);score()}function show(i){document.getElementById("co"+i).style.display="block"}function score(){let n=0;Q.forEach((q,i)=>{if(document.getElementById("fb"+i).classList.contains("fbok"))n++});document.getElementById("score").textContent=n}document.getElementById("checkAll").onclick=()=>{Q.forEach((q,i)=>check(i));scrollTo({top:0,behavior:"smooth"})};document.getElementById("showAll").onclick=()=>Q.forEach((q,i)=>show(i));render();</script></body></html>
