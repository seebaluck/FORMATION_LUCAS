<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>M1H — Quiz Animals</title><style>body{margin:0;font-family:system-ui,Arial;background:linear-gradient(180deg,#0b1022,#0f172a);color:#e5e7eb}.wrap{max-width:1040px;margin:auto;padding:22px}.card{background:#111c33;border:1px solid #263553;border-radius:16px;padding:16px;margin:12px 0}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.btn{display:inline-block;padding:10px 14px;border-radius:12px;background:#1b2a4a;border:1px solid #263553;color:#e5e7eb;text-decoration:none;cursor:pointer}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #263553;padding:10px;text-align:left}th{background:#122246}.chip{display:inline-block;background:#1b2a4a;border:1px solid #263553;border-radius:999px;padding:6px 10px;font-size:13px}.opt{display:block;margin:8px 0}input[type=text]{width:min(650px,100%);padding:10px;border-radius:12px;border:1px solid #263553;background:#0b1430;color:#e5e7eb}.feedback{margin-top:10px;padding:10px;border-radius:12px;display:none}.fbok{display:block;border:1px solid #22c55e;background:#12381f}.fbbad{display:block;border:1px solid #ef4444;background:#3b1111}.corr{margin-top:10px;padding:10px;border:1px dashed #263553;border-radius:12px;display:none}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="top"><div><h1>M1H — Quiz Animals</h1><p>Score immédiat. Corrigé disponible.</p></div><a class="btn" href="./M1H_E.html">⬅️ Retour explication</a></div><button class="btn ok" id="checkAll">✅ Corriger tout</button> <button class="btn warn" id="showAll">👀 Afficher les corrigés</button> <span class="chip">Score : <b id="score">0</b> / <b id="total">0</b></span><div id="quiz"></div><div class="card"><a class="btn" href="./M1H_E.html">🔁 Revoir l’explication</a></div></div><script>function norm(s){return(s||"").toString().trim().toLowerCase().replace(/[’‘]/g,"'").replace(/[.!?]/g,"").replace(/\s+/g," ")}function eq(a,b){return norm(a)===norm(b)}const Q=[["mcq", "Animal", "Cat signifie :", ["chat", "chien", "oiseau"], "chat", "cat = chat."], ["mcq", "Animal", "Dog signifie :", ["chien", "chat", "poisson"], "chien", "dog = chien."], ["mcq", "Animal", "Bird signifie :", ["oiseau", "cheval", "canard"], "oiseau", "bird = oiseau."], ["mcq", "Animal", "Fish signifie :", ["poisson", "souris", "cochon"], "poisson", "fish = poisson."], ["mcq", "Animal", "Rabbit signifie :", ["lapin", "vache", "mouton"], "lapin", "rabbit = lapin."], ["mcq", "Animal", "Horse signifie :", ["cheval", "lion", "tigre"], "cheval", "horse = cheval."], ["mcq", "Animal", "Cow signifie :", ["vache", "canard", "poule"], "vache", "cow = vache."], ["mcq", "Animal", "Sheep signifie :", ["mouton", "souris", "singe"], "mouton", "sheep = mouton."], ["mcq", "Animal", "Pig signifie :", ["cochon", "oiseau", "éléphant"], "cochon", "pig = cochon."], ["mcq", "Animal", "Duck signifie :", ["canard", "poule", "lapin"], "canard", "duck = canard."], ["mcq", "Animal", "Chicken signifie :", ["poulet / poule", "cheval", "poisson"], "poulet / poule", "chicken = poulet / poule."], ["mcq", "Animal", "Mouse signifie :", ["souris", "mouton", "chat"], "souris", "mouse = souris."], ["mcq", "Animal", "Lion signifie :", ["lion", "tigre", "singe"], "lion", "lion = lion."], ["mcq", "Animal", "Tiger signifie :", ["tigre", "lion", "éléphant"], "tigre", "tiger = tigre."], ["mcq", "Animal", "Elephant signifie :", ["éléphant", "singe", "cheval"], "éléphant", "elephant = éléphant."], ["mcq", "Animal", "Monkey signifie :", ["singe", "souris", "canard"], "singe", "monkey = singe."], ["mcq", "Règle", "This is a cat signifie :", ["C’est un chat", "J’aime les chats", "C’est un chien"], "C’est un chat", "This is a cat = c’est un chat."], ["mcq", "Règle", "I like dogs signifie :", ["J’aime les chiens", "Je vois des chiens", "Je suis un chien"], "J’aime les chiens", "I like = j’aime."], ["mcq", "Règle", "On dit :", ["a cat", "an cat", "cat a"], "a cat", "a + consonne."], ["mcq", "Règle", "On dit :", ["an elephant", "a elephant", "elephant an"], "an elephant", "an devant elephant."], ["fill", "Écrire", "Écris chat en anglais :", [], "cat", "chat = cat."], ["fill", "Écrire", "Écris chien en anglais :", [], "dog", "chien = dog."], ["fill", "Écrire", "Écris oiseau en anglais :", [], "bird", "oiseau = bird."], ["fill", "Écrire", "Écris poisson en anglais :", [], "fish", "poisson = fish."], ["fill", "Écrire", "Écris lapin en anglais :", [], "rabbit", "lapin = rabbit."], ["fill", "Écrire", "Écris cheval en anglais :", [], "horse", "cheval = horse."], ["fill", "Écrire", "Écris vache en anglais :", [], "cow", "vache = cow."], ["fill", "Écrire", "Écris mouton en anglais :", [], "sheep", "mouton = sheep."], ["fill", "Écrire", "Écris singe en anglais :", [], "monkey", "singe = monkey."], ["fill", "Écrire", "Complète : This is ___ dog.", [], "a", "This is a dog."], ["fill", "Écrire", "Complète : This is ___ elephant.", [], "an", "This is an elephant."], ["mcq", "Piège", "Le pluriel de sheep peut rester :", ["sheep", "sheeps", "sheepes"], "sheep", "one sheep, two sheep."], ["mcq", "Piège", "Mouse au pluriel devient souvent :", ["mice", "mouses", "mouse"], "mice", "mouse → mice."], ["mcq", "Prononciation", "Chicken commence par le son :", ["tch", "ch français", "k"], "tch", "chicken ≈ tchi-keun."], ["mcq", "Prononciation", "Mouse contient le son :", ["aou", "ou", "é"], "aou", "mouse ≈ maous."], ["mcq", "Collège", "Pet signifie :", ["animal de compagnie", "animal sauvage", "pluriel"], "animal de compagnie", "pet = animal de compagnie."], ["mcq", "Collège", "Wild animal signifie :", ["animal sauvage", "animal de compagnie", "animal marin"], "animal sauvage", "wild animal = animal sauvage."], ["mcq", "Situation", "Lucas voit un chien. Il dit :", ["This is a dog.", "This is an dog.", "I dog like."], "This is a dog.", "Phrase correcte."], ["mcq", "Situation", "Lucas aime les chats. Il dit :", ["I like cats.", "I cats like.", "This is cats."], "I like cats.", "I like cats = j’aime les chats."]];const quiz=document.getElementById("quiz");document.getElementById("total").textContent=Q.length;function esc(s){return(s||"").toString().replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}function render(){quiz.innerHTML="";Q.forEach((q,i)=>{let[type,tag,p,o,a,e]=q;let body=type==="mcq"?o.map(x=>`<label class="opt"><input type="radio" name="q${i}" value="${esc(x)}"> ${esc(x)}</label>`).join(""):`<input type="text" id="q${i}_text" placeholder="Écris ta réponse ici…">`;let c=document.createElement("div");c.className="card";c.innerHTML=`<b>Question ${i+1}</b> <span class="chip">${esc(tag)}</span><p>${esc(p)}</p>${body}<button class="btn ok" onclick="check(${i})">Corriger</button> <button class="btn warn" onclick="show(${i})">Voir le corrigé</button><div id="fb${i}" class="feedback"></div><div id="co${i}" class="corr"><b>Corrigé :</b> ${esc(a)}<br><span class="small">${esc(e)}</span></div>`;quiz.appendChild(c)})}function answer(i){let type=Q[i][0];if(type==="mcq"){let x=document.querySelector(`input[name=q${i}]:checked`);return x?x.value:""}return document.getElementById(`q${i}_text`).value}function check(i){let ok=eq(answer(i),Q[i][4]);let fb=document.getElementById("fb"+i);fb.className="feedback "+(ok?"fbok":"fbbad");fb.innerHTML=ok?"✅ Correct !":"❌ Faux. Regarde le corrigé.";if(ok)show(i);score()}function show(i){document.getElementById("co"+i).style.display="block"}function score(){let n=0;Q.forEach((q,i)=>{if(document.getElementById("fb"+i).classList.contains("fbok"))n++});document.getElementById("score").textContent=n}document.getElementById("checkAll").onclick=()=>{Q.forEach((q,i)=>check(i));scrollTo({top:0,behavior:"smooth"})};document.getElementById("showAll").onclick=()=>Q.forEach((q,i)=>show(i));render();</script></body></html>
