<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M1C — Quiz Classroom English</title><style>
:root{--bg1:#0b1022;--bg2:#0f172a;--card:#111c33;--line:#263553;--chip:#1b2a4a;--text:#e5e7eb;--muted:#b7c0d1;--ok:#22c55e;--bad:#ef4444;--warn:#f59e0b;--a:#60a5fa}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}
.wrap{max-width:1040px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
h1{margin:0;font-size:24px}.sub{color:var(--muted);line-height:1.4}.card{background:rgba(17,28,51,.9);border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}
.btn{display:inline-block;padding:10px 14px;border-radius:12px;background:#1b2a4a;border:1px solid var(--line);color:var(--text);text-decoration:none;cursor:pointer}.btn.ok{border-color:rgba(34,197,94,.7)}.btn.warn{border-color:rgba(245,158,11,.8)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:850px){.grid{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;margin-top:10px}td,th{border-bottom:1px solid var(--line);padding:10px;text-align:left}th{color:#dbeafe;background:#122246}
code{background:#0b1430;border:1px solid var(--line);padding:2px 6px;border-radius:8px}.pill,.chip{display:inline-block;border:1px solid var(--line);background:#1b2a4a;border-radius:999px;padding:6px 10px;margin:4px;color:#dbeafe;font-size:13px}
.good{border-color:rgba(34,197,94,.55);background:rgba(34,197,94,.08)}.warnbox{border-color:rgba(245,158,11,.65);background:rgba(245,158,11,.08)}
.ex{border-left:4px solid var(--a);padding-left:12px;margin:12px 0}.small{color:var(--muted);font-size:14px;line-height:1.45}
.opt{display:block;margin:8px 0}input[type=text]{width:min(650px,100%);padding:10px;border-radius:12px;border:1px solid var(--line);background:#0b1430;color:var(--text)}
.feedback{margin-top:10px;padding:10px;border-radius:12px;display:none}.fbok{display:block;border:1px solid rgba(34,197,94,.75);background:rgba(34,197,94,.08)}.fbbad{display:block;border:1px solid rgba(239,68,68,.75);background:rgba(239,68,68,.08)}
.corr{margin-top:10px;padding:10px;border:1px dashed var(--line);border-radius:12px;display:none;background:rgba(255,255,255,.03)}
</style></head>
<body><div class="wrap">
<div class="top"><div><h1>M1C — Quiz Classroom English</h1><div class="sub">Q = pratique. 30 questions. Score immédiat. Corrigé disponible.</div></div><a class="btn" href="./M1C_E.html">⬅️ Retour explication</a></div>
<button class="btn ok" id="checkAll">✅ Corriger tout</button> <button class="btn warn" id="showAll">👀 Afficher les corrigés</button> <span class="chip">Score : <b id="score">0</b> / <b id="total">0</b></span>
<div id="quiz"></div><div class="card"><a class="btn" href="./M1C_E.html">🔁 Revoir l’explication</a></div></div>
<script>
function norm(s){return (s||"").toString().trim().toLowerCase().replace(/[’‘]/g,"'").replace(/[.!?]/g,"").replace(/\s+/g," ")}
function eq(a,b){return norm(a)===norm(b)}
const Q=[
["mcq","Traduction","Open your book signifie :",["Ouvre ton livre","Ferme ton livre","Lis ton livre"],"Ouvre ton livre","Open = ouvrir ; book = livre."],
["mcq","Traduction","Close your book signifie :",["Ferme ton livre","Ouvre ton cahier","Écris"],"Ferme ton livre","Close = fermer."],
["mcq","Traduction","Open your notebook signifie :",["Ouvre ton cahier","Ouvre ton livre","Ferme ton cahier"],"Ouvre ton cahier","Notebook = cahier."],
["mcq","Traduction","Listen signifie :",["Écoute","Lis","Écris"],"Écoute","Listen = écouter."],
["mcq","Traduction","Repeat signifie :",["Répète","Regarde","Lève-toi"],"Répète","Repeat = répéter."],
["mcq","Traduction","Read signifie :",["Lis","Écris","Ferme"],"Lis","Read = lire."],
["mcq","Traduction","Write signifie :",["Écris","Lis","Écoute"],"Écris","Write = écrire."],
["mcq","Traduction","Look signifie :",["Regarde","Livre","Travaille"],"Regarde","Look = regarder."],
["mcq","Traduction","Stand up signifie :",["Lève-toi","Assieds-toi","Silence"],"Lève-toi","Stand up = se lever."],
["mcq","Traduction","Sit down signifie :",["Assieds-toi","Lève-toi","Écoute"],"Assieds-toi","Sit down = s’asseoir."],
["mcq","Traduction","Work in pairs signifie :",["Travaillez par deux","Ouvre ton livre","Écris ton nom"],"Travaillez par deux","pairs = paires / groupes de deux."],
["mcq","Traduction","Be quiet signifie :",["Silence / soyez calmes","Répète","Bonjour"],"Silence / soyez calmes","quiet = calme / silencieux."],
["mcq","Différence","Book signifie :",["Livre","Cahier","Stylo"],"Livre","Book = livre."],
["mcq","Différence","Notebook signifie :",["Cahier","Livre","Table"],"Cahier","Notebook = cahier."],
["mcq","Piège","Look signifie :",["Regarde","Livre","Ferme"],"Regarde","Look ≠ book."],
["mcq","Situation","Le professeur dit : Listen. Lucas doit :",["écouter","écrire","se lever"],"écouter","Listen = écouter."],
["mcq","Situation","Le professeur dit : Repeat. Lucas doit :",["répéter","lire","fermer son livre"],"répéter","Repeat = répéter."],
["mcq","Situation","Le professeur dit : Write. Lucas doit :",["écrire","écouter","regarder"],"écrire","Write = écrire."],
["mcq","Situation","Le professeur dit : Stand up. Lucas doit :",["se lever","s’asseoir","lire"],"se lever","Stand up = se lever."],
["mcq","Situation","Le professeur dit : Sit down. Lucas doit :",["s’asseoir","se lever","dire au revoir"],"s’asseoir","Sit down = s’asseoir."],
["fill","Compléter","Complète : Open your ___.",[],"book","Open your book."],
["fill","Compléter","Complète : Close your ___.",[],"book","Close your book."],
["fill","Compléter","Complète : Work in ___.",[],"pairs","Work in pairs."],
["fill","Compléter","Complète : Be ___.",[],"quiet","Be quiet."],
["fill","Écrire","Écris “Écoute” en anglais :",[],"Listen","Listen = écoute."],
["fill","Écrire","Écris “Répète” en anglais :",[],"Repeat","Repeat = répète."],
["fill","Écrire","Écris “Écris” en anglais :",[],"Write","Write = écris."],
["mcq","Prononciation","Write se prononce plutôt :",["raït","wraït","writé"],"raït","Le w est muet."],
["mcq","Collège","Instruction signifie :",["Consigne","Livre","Élève"],"Consigne","Instruction = consigne."],
["mcq","Collège","Teacher signifie :",["Professeur","Élève","Cahier"],"Professeur","Teacher = professeur."]
];
const quiz=document.getElementById("quiz");document.getElementById("total").textContent=Q.length;
function esc(s){return (s||"").toString().replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
function render(){quiz.innerHTML="";Q.forEach((q,i)=>{let [type,tag,p,o,a,e]=q;let body=type==="mcq"?o.map(x=>`<label class="opt"><input type="radio" name="q${i}" value="${esc(x)}"> ${esc(x)}</label>`).join(""):`<input type="text" id="q${i}_text" placeholder="Écris ta réponse ici…">`;let c=document.createElement("div");c.className="card";c.innerHTML=`<b>Question ${i+1}</b> <span class="chip">${esc(tag)}</span><p>${esc(p)}</p>${body}<button class="btn ok" onclick="check(${i})">Corriger</button> <button class="btn warn" onclick="show(${i})">Voir le corrigé</button><div id="fb${i}" class="feedback"></div><div id="co${i}" class="corr"><b>Corrigé :</b> ${esc(a)}<br><span class="small">${esc(e)}</span></div>`;quiz.appendChild(c)})}
function answer(i){let type=Q[i][0];if(type==="mcq"){let x=document.querySelector(`input[name=q${i}]:checked`);return x?x.value:""}return document.getElementById(`q${i}_text`).value}
function check(i){let ok=eq(answer(i),Q[i][4]);let fb=document.getElementById("fb"+i);fb.className="feedback "+(ok?"fbok":"fbbad");fb.innerHTML=ok?"✅ Correct !":"❌ Faux. Regarde le corrigé.";if(ok)show(i);score()}
function show(i){document.getElementById("co"+i).style.display="block"}
function score(){let n=0;Q.forEach((q,i)=>{if(document.getElementById("fb"+i).classList.contains("fbok"))n++});document.getElementById("score").textContent=n}
document.getElementById("checkAll").onclick=()=>{Q.forEach((q,i)=>check(i));scrollTo({top:0,behavior:"smooth"})}
document.getElementById("showAll").onclick=()=>Q.forEach((q,i)=>show(i))
render();
</script></body></html>
