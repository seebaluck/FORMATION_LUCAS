<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>M1G — Quiz Family</title><style>body{margin:0;font-family:system-ui,Arial;background:linear-gradient(180deg,#0b1022,#0f172a);color:#e5e7eb}.wrap{max-width:1040px;margin:auto;padding:22px}.card{background:#111c33;border:1px solid #263553;border-radius:16px;padding:16px;margin:12px 0}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.btn{display:inline-block;padding:10px 14px;border-radius:12px;background:#1b2a4a;border:1px solid #263553;color:#e5e7eb;text-decoration:none;cursor:pointer}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #263553;padding:10px;text-align:left}th{background:#122246}.chip{display:inline-block;background:#1b2a4a;border:1px solid #263553;border-radius:999px;padding:6px 10px;font-size:13px}.opt{display:block;margin:8px 0}input[type=text]{width:min(650px,100%);padding:10px;border-radius:12px;border:1px solid #263553;background:#0b1430;color:#e5e7eb}.feedback{margin-top:10px;padding:10px;border-radius:12px;display:none}.fbok{display:block;border:1px solid #22c55e;background:#12381f}.fbbad{display:block;border:1px solid #ef4444;background:#3b1111}.corr{margin-top:10px;padding:10px;border:1px dashed #263553;border-radius:12px;display:none}</style></head><body><div class="wrap"><div class="top"><div><h1>M1G — Quiz Family</h1><p>Score immédiat. Corrigé disponible.</p></div><a class="btn" href="./M1G_E.html">⬅️ Retour explication</a></div><button class="btn ok" id="checkAll">✅ Corriger tout</button> <button class="btn warn" id="showAll">👀 Afficher les corrigés</button> <span class="chip">Score : <b id="score">0</b> / <b id="total">0</b></span><div id="quiz"></div><div class="card"><a class="btn" href="./M1G_E.html">🔁 Revoir l’explication</a></div></div><script>
function norm(s){return(s||"").toString().trim().toLowerCase().replace(/[’‘]/g,"'").replace(/[.!?]/g,"").replace(/\s+/g," ")}
function eq(a,b){return norm(a)===norm(b)}
const Q=[["mcq", "Vocabulaire", "Family signifie :", ["famille", "ami", "classe"], "famille", "family = famille."], ["mcq", "Vocabulaire", "Mother signifie :", ["mère", "père", "frère"], "mère", "mother = mère."], ["mcq", "Vocabulaire", "Father signifie :", ["père", "mère", "sœur"], "père", "father = père."], ["mcq", "Vocabulaire", "Brother signifie :", ["frère", "sœur", "cousin"], "frère", "brother = frère."], ["mcq", "Vocabulaire", "Sister signifie :", ["sœur", "frère", "tante"], "sœur", "sister = sœur."], ["mcq", "Vocabulaire", "Parents signifie :", ["parents", "grands-parents", "enfants"], "parents", "parents = parents."], ["mcq", "Vocabulaire", "Grandmother signifie :", ["grand-mère", "grand-père", "mère"], "grand-mère", "grandmother = grand-mère."], ["mcq", "Vocabulaire", "Grandfather signifie :", ["grand-père", "grand-mère", "père"], "grand-père", "grandfather = grand-père."], ["mcq", "Vocabulaire", "Uncle signifie :", ["oncle", "tante", "cousin"], "oncle", "uncle = oncle."], ["mcq", "Vocabulaire", "Aunt signifie :", ["tante", "oncle", "sœur"], "tante", "aunt = tante."], ["mcq", "Vocabulaire", "Cousin signifie :", ["cousin / cousine", "fils", "fille"], "cousin / cousine", "cousin = cousin/cousine."], ["mcq", "Vocabulaire", "Daughter signifie :", ["fille", "fils", "mère"], "fille", "daughter = fille."], ["mcq", "Vocabulaire", "Son signifie :", ["fils", "soleil", "père"], "fils", "son = fils."], ["mcq", "Règle", "My signifie :", ["mon / ma / mes", "ton / ta / tes", "son / sa / ses"], "mon / ma / mes", "my = mon / ma / mes."], ["mcq", "Règle", "This is my mother signifie :", ["Voici ma mère", "Voici mon père", "J’aime ma mère"], "Voici ma mère", "This is my... = voici mon/ma..."], ["fill", "Écrire", "Écris mère en anglais :", [], "mother", "mère = mother."], ["fill", "Écrire", "Écris père en anglais :", [], "father", "père = father."], ["fill", "Écrire", "Écris frère en anglais :", [], "brother", "frère = brother."], ["fill", "Écrire", "Écris sœur en anglais :", [], "sister", "sœur = sister."], ["fill", "Écrire", "Écris famille en anglais :", [], "family", "famille = family."], ["fill", "Écrire", "Écris mon / ma / mes en anglais :", [], "my", "my = mon/ma/mes."], ["fill", "Compléter", "This is ___ mother.", [], "my", "This is my mother."], ["fill", "Compléter", "This is my ___. (frère)", [], "brother", "frère = brother."], ["mcq", "Phrase", "My father signifie :", ["mon père", "ma mère", "mon frère"], "mon père", "father = père."], ["mcq", "Phrase", "My sister signifie :", ["ma sœur", "mon frère", "ma tante"], "ma sœur", "sister = sœur."], ["mcq", "Phrase", "My parents signifie :", ["mes parents", "mon père", "mes cousins"], "mes parents", "parents = parents."], ["mcq", "Piège", "Parents en anglais signifie :", ["parents", "famille éloignée", "enfants"], "parents", "parents = père et mère."], ["mcq", "Piège", "Son peut signifier :", ["fils", "soleil", "les deux selon le mot écrit"], "fils", "son = fils ; sun = soleil."], ["mcq", "Prononciation", "Brother contient un son important :", ["th", "ch", "sh"], "th", "brother contient th."], ["mcq", "Collège", "This is sert à :", ["présenter", "compter", "dire au revoir"], "présenter", "This is = c’est / voici."], ["mcq", "Situation", "Lucas présente son père. Il dit :", ["This is my father.", "This is my mother.", "My father is this."], "This is my father.", "Forme naturelle."], ["mcq", "Situation", "Lucas présente sa sœur. Il dit :", ["This is my sister.", "This is my brother.", "This is my cousin."], "This is my sister.", "sister = sœur."], ["mcq", "Situation", "Lucas veut dire “ma famille”. Il dit :", ["my family", "me family", "I family"], "my family", "my family = ma famille."]];const quiz=document.getElementById("quiz");document.getElementById("total").textContent=Q.length;
function esc(s){return(s||"").toString().replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
function render(){quiz.innerHTML="";Q.forEach((q,i)=>{let[type,tag,p,o,a,e]=q;let body=type==="mcq"?o.map(x=>`<label class="opt"><input type="radio" name="q${i}" value="${esc(x)}"> ${esc(x)}</label>`).join(""):`<input type="text" id="q${i}_text" placeholder="Écris ta réponse ici…">`;let c=document.createElement("div");c.className="card";c.innerHTML=`<b>Question ${i+1}</b> <span class="chip">${esc(tag)}</span><p>${esc(p)}</p>${body}<button class="btn ok" onclick="check(${i})">Corriger</button> <button class="btn warn" onclick="show(${i})">Voir le corrigé</button><div id="fb${i}" class="feedback"></div><div id="co${i}" class="corr"><b>Corrigé :</b> ${esc(a)}<br><span class="small">${esc(e)}</span></div>`;quiz.appendChild(c)})}
function answer(i){let type=Q[i][0];if(type==="mcq"){let x=document.querySelector(`input[name=q${i}]:checked`);return x?x.value:""}return document.getElementById(`q${i}_text`).value}
function check(i){let ok=eq(answer(i),Q[i][4]);let fb=document.getElementById("fb"+i);fb.className="feedback "+(ok?"fbok":"fbbad");fb.innerHTML=ok?"✅ Correct !":"❌ Faux. Regarde le corrigé.";if(ok)show(i);score()}
function show(i){document.getElementById("co"+i).style.display="block"}
function score(){let n=0;Q.forEach((q,i)=>{if(document.getElementById("fb"+i).classList.contains("fbok"))n++});document.getElementById("score").textContent=n}
document.getElementById("checkAll").onclick=()=>{Q.forEach((q,i)=>check(i));scrollTo({top:0,behavior:"smooth"})};document.getElementById("showAll").onclick=()=>Q.forEach((q,i)=>show(i));render();
</script></body></html>
