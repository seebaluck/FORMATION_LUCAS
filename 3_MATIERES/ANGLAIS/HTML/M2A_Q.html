<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>M2A — Quiz Food</title><style>
:root{--bg1:#0b1022;--bg2:#0f172a;--card:#111c33;--line:#263553;--text:#e5e7eb;--muted:#b7c0d1;--blue:#60a5fa;--ok:#22c55e;--bad:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}.wrap{max-width:1040px;margin:0 auto;padding:22px}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}h1{margin:0;font-size:26px}.sub{color:var(--muted);line-height:1.45}.card{background:rgba(17,28,51,.92);border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}.btn{display:inline-block;padding:10px 14px;border-radius:12px;background:#1b2a4a;border:1px solid var(--line);color:var(--text);text-decoration:none;cursor:pointer}.btn.ok{border-color:rgba(34,197,94,.7)}.btn.warn{border-color:#f59e0b}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:850px){.grid{grid-template-columns:1fr}}table{width:100%;border-collapse:collapse;margin-top:10px}td,th{border-bottom:1px solid var(--line);padding:10px;text-align:left}th{background:#122246;color:#dbeafe}.chip{display:inline-block;border:1px solid var(--line);background:#1b2a4a;border-radius:999px;padding:6px 10px;margin:4px;color:#dbeafe;font-size:13px}.opt{display:block;margin:8px 0}input[type=text]{width:min(650px,100%);padding:10px;border-radius:12px;border:1px solid var(--line);background:#0b1430;color:var(--text)}.feedback{margin-top:10px;padding:10px;border-radius:12px;display:none}.fbok{display:block;border:1px solid var(--ok);background:rgba(34,197,94,.10)}.fbbad{display:block;border:1px solid var(--bad);background:rgba(239,68,68,.10)}.corr{margin-top:10px;padding:10px;border:1px dashed var(--line);border-radius:12px;display:none;background:rgba(255,255,255,.03)}.small{color:var(--muted);font-size:14px}
</style></head><body><div class="wrap"><div class="top"><div><h1>M2A — Quiz Food</h1><div class="sub">Q = pratique. Score immédiat. Corrigé disponible.</div></div><a class="btn" href="./M2A_E.html">⬅️ Retour explication</a></div><button class="btn ok" id="checkAll">✅ Corriger tout</button> <button class="btn warn" id="showAll">👀 Afficher les corrigés</button> <span class="chip">Score : <b id="score">0</b> / <b id="total">0</b></span><div id="quiz"></div><div class="card"><a class="btn" href="./M2A_E.html">🔁 Revoir l’explication</a></div></div><script>function norm(s){return(s||"").toString().trim().toLowerCase().replace(/[’‘]/g,"'").replace(/[.!?]/g,"").replace(/\s+/g," ")}function eq(a,b){return norm(a)===norm(b)}const Q=[["mcq", "Vocabulaire", "Apple signifie :", ["pomme", "banane", "pain"], "pomme", "apple = pomme."], ["mcq", "Vocabulaire", "Banana signifie :", ["banane", "fromage", "jus"], "banane", "banana = banane."], ["mcq", "Vocabulaire", "Bread signifie :", ["pain", "lait", "œuf"], "pain", "bread = pain."], ["mcq", "Vocabulaire", "Water signifie :", ["eau", "jus", "lait"], "eau", "water = eau."], ["mcq", "Vocabulaire", "Milk signifie :", ["lait", "eau", "riz"], "lait", "milk = lait."], ["mcq", "Vocabulaire", "Cheese signifie :", ["fromage", "poulet", "gâteau"], "fromage", "cheese = fromage."], ["mcq", "Vocabulaire", "Egg signifie :", ["œuf", "poisson", "pain"], "œuf", "egg = œuf."], ["mcq", "Vocabulaire", "Rice signifie :", ["riz", "jus", "banane"], "riz", "rice = riz."], ["mcq", "Vocabulaire", "Chicken signifie :", ["poulet", "poisson", "fromage"], "poulet", "chicken = poulet."], ["mcq", "Vocabulaire", "Juice signifie :", ["jus", "eau", "lait"], "jus", "juice = jus."], ["mcq", "Vocabulaire", "Fish signifie :", ["poisson", "pomme", "riz"], "poisson", "fish = poisson."], ["mcq", "Vocabulaire", "Cake signifie :", ["gâteau", "œuf", "pain"], "gâteau", "cake = gâteau."], ["mcq", "Phrase", "I like apples signifie :", ["J’aime les pommes", "Je mange des pommes", "Je bois du jus"], "J’aime les pommes", "I like = j’aime."], ["mcq", "Phrase", "I don’t like milk signifie :", ["Je n’aime pas le lait", "J’aime le lait", "Je bois du lait"], "Je n’aime pas le lait", "I don’t like = je n’aime pas."], ["mcq", "Phrase", "I drink water signifie :", ["Je bois de l’eau", "Je mange du pain", "J’aime l’eau"], "Je bois de l’eau", "drink = boire."], ["mcq", "Phrase", "I eat bread signifie :", ["Je mange du pain", "Je bois du lait", "J’aime le pain"], "Je mange du pain", "eat = manger."], ["mcq", "Règle", "I like signifie :", ["j’aime", "je n’aime pas", "je bois"], "j’aime", "I like = j’aime."], ["mcq", "Règle", "I don’t like signifie :", ["je n’aime pas", "j’aime", "je mange"], "je n’aime pas", "I don’t like = je n’aime pas."], ["mcq", "Règle", "Eat signifie :", ["manger", "boire", "aimer"], "manger", "eat = manger."], ["mcq", "Règle", "Drink signifie :", ["boire", "manger", "regarder"], "boire", "drink = boire."], ["fill", "Écrire", "Écris pomme en anglais :", [], "apple", "pomme = apple."], ["fill", "Écrire", "Écris banane en anglais :", [], "banana", "banane = banana."], ["fill", "Écrire", "Écris pain en anglais :", [], "bread", "pain = bread."], ["fill", "Écrire", "Écris eau en anglais :", [], "water", "eau = water."], ["fill", "Écrire", "Écris lait en anglais :", [], "milk", "lait = milk."], ["fill", "Écrire", "Écris fromage en anglais :", [], "cheese", "fromage = cheese."], ["fill", "Écrire", "Écris œuf en anglais :", [], "egg", "œuf = egg."], ["fill", "Écrire", "Écris riz en anglais :", [], "rice", "riz = rice."], ["fill", "Écrire", "Écris poulet en anglais :", [], "chicken", "poulet = chicken."], ["fill", "Écrire", "Écris jus en anglais :", [], "juice", "jus = juice."], ["fill", "Compléter", "Complète : I ___ apples.", [], "like", "I like apples."], ["fill", "Compléter", "Complète : I drink ___.", [], "water", "I drink water."], ["fill", "Compléter", "Complète : I eat ___.", [], "bread", "I eat bread."], ["mcq", "Prononciation", "Water se prononce plutôt :", ["WO-teur", "va-tèr", "oua-ta"], "WO-teur", "water ≈ WO-teur."], ["mcq", "Prononciation", "Chicken commence par le son :", ["tch", "ch français", "k"], "tch", "chicken ≈ TCHI-keun."], ["mcq", "Prononciation", "Juice commence par le son :", ["dj", "j français", "z"], "dj", "juice ≈ djouss."], ["mcq", "Collège", "Food signifie :", ["nourriture", "boisson", "couleur"], "nourriture", "food = nourriture."], ["mcq", "Situation", "Lucas aime le fromage. Il dit :", ["I like cheese.", "I drink cheese.", "I don’t cheese."], "I like cheese.", "Phrase correcte."], ["mcq", "Situation", "Lucas n’aime pas le lait. Il dit :", ["I don’t like milk.", "I like milk.", "I eat milk."], "I don’t like milk.", "Phrase correcte."], ["mcq", "Situation", "Lucas boit du jus. Il dit :", ["I drink juice.", "I eat juice.", "I like bread."], "I drink juice.", "drink = boire."]];const quiz=document.getElementById("quiz");document.getElementById("total").textContent=Q.length;function esc(s){return(s||"").toString().replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}function render(){quiz.innerHTML="";Q.forEach((q,i)=>{let[type,tag,p,o,a,e]=q;let body=type==="mcq"?o.map(x=>`<label class="opt"><input type="radio" name="q${i}" value="${esc(x)}"> ${esc(x)}</label>`).join(""):`<input type="text" id="q${i}_text" placeholder="Écris ta réponse ici…">`;let c=document.createElement("div");c.className="card";c.innerHTML=`<b>Question ${i+1}</b> <span class="chip">${esc(tag)}</span><p>${esc(p)}</p>${body}<button class="btn ok" onclick="check(${i})">Corriger</button> <button class="btn warn" onclick="show(${i})">Voir le corrigé</button><div id="fb${i}" class="feedback"></div><div id="co${i}" class="corr"><b>Corrigé :</b> ${esc(a)}<br><span class="small">${esc(e)}</span></div>`;quiz.appendChild(c)})}function answer(i){let type=Q[i][0];if(type==="mcq"){let x=document.querySelector(`input[name=q${i}]:checked`);return x?x.value:""}return document.getElementById(`q${i}_text`).value}function check(i){let ok=eq(answer(i),Q[i][4]);let fb=document.getElementById("fb"+i);fb.className="feedback "+(ok?"fbok":"fbbad");fb.innerHTML=ok?"✅ Correct !":"❌ Faux. Regarde le corrigé.";if(ok)show(i);score()}function show(i){document.getElementById("co"+i).style.display="block"}function score(){let n=0;Q.forEach((q,i)=>{if(document.getElementById("fb"+i).classList.contains("fbok"))n++});document.getElementById("score").textContent=n}document.getElementById("checkAll").onclick=()=>{Q.forEach((q,i)=>check(i));scrollTo({top:0,behavior:"smooth"})};document.getElementById("showAll").onclick=()=>Q.forEach((q,i)=>show(i));render();</script></body></html>
