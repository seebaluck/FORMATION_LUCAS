<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>M1D — Quiz Numbers</title><style>
:root{--bg1:#0b1022;--bg2:#0f172a;--card:#111c33;--line:#263553;--chip:#1b2a4a;--text:#e5e7eb;--muted:#b7c0d1;--ok:#22c55e;--bad:#ef4444;--warn:#f59e0b;--a:#60a5fa}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}.wrap{max-width:1040px;margin:auto;padding:22px}
.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}h1{margin:0;font-size:24px}.sub{color:var(--muted);line-height:1.4}
.card{background:rgba(17,28,51,.9);border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}.btn{display:inline-block;padding:10px 14px;border-radius:12px;background:#1b2a4a;border:1px solid var(--line);color:var(--text);text-decoration:none;cursor:pointer}
.btn.ok{border-color:rgba(34,197,94,.7)}.btn.warn{border-color:rgba(245,158,11,.8)}table{width:100%;border-collapse:collapse;margin-top:10px}td,th{border-bottom:1px solid var(--line);padding:10px;text-align:left}th{color:#dbeafe;background:#122246}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:850px){.grid{grid-template-columns:1fr}}code{background:#0b1430;border:1px solid var(--line);padding:2px 6px;border-radius:8px}.pill,.chip{display:inline-block;border:1px solid var(--line);background:#1b2a4a;border-radius:999px;padding:6px 10px;margin:4px;color:#dbeafe;font-size:13px}
.good{border-color:rgba(34,197,94,.55);background:rgba(34,197,94,.08)}.warnbox{border-color:rgba(245,158,11,.65);background:rgba(245,158,11,.08)}.ex{border-left:4px solid var(--a);padding-left:12px;margin:12px 0}.small{color:var(--muted);font-size:14px}
.opt{display:block;margin:8px 0}input[type=text]{width:min(650px,100%);padding:10px;border-radius:12px;border:1px solid var(--line);background:#0b1430;color:var(--text)}
.feedback{margin-top:10px;padding:10px;border-radius:12px;display:none}.fbok{display:block;border:1px solid rgba(34,197,94,.75);background:rgba(34,197,94,.08)}.fbbad{display:block;border:1px solid rgba(239,68,68,.75);background:rgba(239,68,68,.08)}
.corr{margin-top:10px;padding:10px;border:1px dashed var(--line);border-radius:12px;display:none;background:rgba(255,255,255,.03)}
</style></head><body><div class="wrap">
<div class="top"><div><h1>M1D — Quiz Numbers</h1><div class="sub">Q = pratique. Score immédiat. Corrigé disponible.</div></div><a class="btn" href="./M1D_E.html">⬅️ Retour explication</a></div>
<button class="btn ok" id="checkAll">✅ Corriger tout</button> <button class="btn warn" id="showAll">👀 Afficher les corrigés</button> <span class="chip">Score : <b id="score">0</b> / <b id="total">0</b></span><div id="quiz"></div><div class="card"><a class="btn" href="./M1D_E.html">🔁 Revoir l’explication</a></div></div>
<script>
function norm(s){return (s||"").toString().trim().toLowerCase().replace(/[’‘]/g,"'").replace(/[.!?]/g,"").replace(/\s+/g," ")}
function eq(a,b){return norm(a)===norm(b)}
const Q=[['mcq', 'Traduction', '0 se dit :', ['zero', 'one', 'ten'], 'zero', '0 = zero.'], ['mcq', 'Traduction', '1 se dit :', ['one', 'two', 'seven'], 'one', '1 = one.'], ['mcq', 'Traduction', '2 se dit :', ['two', 'three', 'twelve'], 'two', '2 = two.'], ['mcq', 'Traduction', '3 se dit :', ['three', 'thirteen', 'thirty'], 'three', '3 = three.'], ['mcq', 'Traduction', '4 se dit :', ['four', 'forty', 'fourteen'], 'four', '4 = four.'], ['mcq', 'Traduction', '5 se dit :', ['five', 'fifteen', 'fifty'], 'five', '5 = five.'], ['mcq', 'Traduction', '8 se dit :', ['eight', 'eighteen', 'eighty'], 'eight', '8 = eight.'], ['mcq', 'Traduction', '10 se dit :', ['ten', 'twelve', 'twenty'], 'ten', '10 = ten.'], ['mcq', 'Traduction', '11 se dit :', ['eleven', 'seven', 'seventeen'], 'eleven', '11 = eleven.'], ['mcq', 'Traduction', '12 se dit :', ['twelve', 'twenty', 'two'], 'twelve', '12 = twelve.'], ['mcq', 'Traduction', '13 se dit :', ['thirteen', 'three', 'thirty'], 'thirteen', '13 = thirteen.'], ['mcq', 'Traduction', '15 se dit :', ['fifteen', 'five teen', 'fifty'], 'fifteen', '15 = fifteen.'], ['mcq', 'Traduction', '18 se dit :', ['eighteen', 'eighty', 'eight'], 'eighteen', '18 = eighteen.'], ['mcq', 'Traduction', '20 se dit :', ['twenty', 'twelve', 'two'], 'twenty', '20 = twenty.'], ['mcq', 'Dizaines', '30 se dit :', ['thirty', 'thirteen', 'three'], 'thirty', '30 = thirty.'], ['mcq', 'Dizaines', '40 se dit :', ['forty', 'fourty', 'fourteen'], 'forty', '40 = forty, sans u.'], ['mcq', 'Dizaines', '50 se dit :', ['fifty', 'fifteen', 'five'], 'fifty', '50 = fifty.'], ['mcq', 'Dizaines', '80 se dit :', ['eighty', 'eighteen', 'eight'], 'eighty', '80 = eighty.'], ['fill', 'Écrire', 'Écris 7 en anglais :', [], 'seven', '7 = seven.'], ['fill', 'Écrire', 'Écris 9 en anglais :', [], 'nine', '9 = nine.'], ['fill', 'Écrire', 'Écris 14 en anglais :', [], 'fourteen', '14 = fourteen.'], ['fill', 'Écrire', 'Écris 16 en anglais :', [], 'sixteen', '16 = sixteen.'], ['fill', 'Écrire', 'Écris 20 en anglais :', [], 'twenty', '20 = twenty.'], ['fill', 'Écrire', 'Écris 40 en anglais :', [], 'forty', '40 = forty.'], ['mcq', 'Piège', 'Choisis la bonne orthographe :', ['forty', 'fourty', 'fourtie'], 'forty', 'Forty s’écrit sans u.'], ['mcq', 'Piège', 'Choisis la bonne orthographe :', ['eighteen', 'eightteen', 'eigthteen'], 'eighteen', '18 = eighteen.'], ['mcq', 'Piège', 'Choisis la bonne orthographe :', ['fifteen', 'fiveteen', 'fivteen'], 'fifteen', '15 = fifteen.'], ['mcq', 'Comparaison', 'Three correspond à :', ['3', '13', '30'], '3', 'three = 3.'], ['mcq', 'Comparaison', 'Thirteen correspond à :', ['13', '3', '30'], '13', 'thirteen = 13.'], ['mcq', 'Comparaison', 'Thirty correspond à :', ['30', '13', '3'], '30', 'thirty = 30.'], ['mcq', 'Collège', 'Number signifie :', ['nombre', 'couleur', 'livre'], 'nombre', 'Number = nombre.'], ['mcq', 'Collège', 'Count signifie :', ['compter', 'écouter', 'écrire'], 'compter', 'Count = compter.'], ['mcq', 'Situation', 'Lucas veut dire son âge : 11. Il dit :', ['eleven', 'seven', 'twenty'], 'eleven', '11 = eleven.'], ['mcq', 'Situation', 'Lucas compte : 18, 19, 20. Il dit :', ['eighteen, nineteen, twenty', 'eight, nine, ten', 'thirty, forty, fifty'], 'eighteen, nineteen, twenty', 'Suite correcte.']];
const quiz=document.getElementById("quiz");document.getElementById("total").textContent=Q.length;
function esc(s){return (s||"").toString().replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
function render(){quiz.innerHTML="";Q.forEach((q,i)=>{let [type,tag,p,o,a,e]=q;let body=type==="mcq"?o.map(x=>`<label class="opt"><input type="radio" name="q${i}" value="${esc(x)}"> ${esc(x)}</label>`).join(""):`<input type="text" id="q${i}_text" placeholder="Écris ta réponse ici…">`;let c=document.createElement("div");c.className="card";c.innerHTML=`<b>Question ${i+1}</b> <span class="chip">${esc(tag)}</span><p>${esc(p)}</p>${body}<button class="btn ok" onclick="check(${i})">Corriger</button> <button class="btn warn" onclick="show(${i})">Voir le corrigé</button><div id="fb${i}" class="feedback"></div><div id="co${i}" class="corr"><b>Corrigé :</b> ${esc(a)}<br><span class="small">${esc(e)}</span></div>`;quiz.appendChild(c)})}
function answer(i){let type=Q[i][0];if(type==="mcq"){let x=document.querySelector(`input[name=q${i}]:checked`);return x?x.value:""}return document.getElementById(`q${i}_text`).value}
function check(i){let ok=eq(answer(i),Q[i][4]);let fb=document.getElementById("fb"+i);fb.className="feedback "+(ok?"fbok":"fbbad");fb.innerHTML=ok?"✅ Correct !":"❌ Faux. Regarde le corrigé.";if(ok)show(i);score()}
function show(i){document.getElementById("co"+i).style.display="block"}
function score(){let n=0;Q.forEach((q,i)=>{if(document.getElementById("fb"+i).classList.contains("fbok"))n++});document.getElementById("score").textContent=n}
document.getElementById("checkAll").onclick=()=>{Q.forEach((q,i)=>check(i));scrollTo({top:0,behavior:"smooth"})}
document.getElementById("showAll").onclick=()=>Q.forEach((q,i)=>show(i))
render();
</script></body></html>
